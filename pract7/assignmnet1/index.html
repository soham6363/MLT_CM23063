<!DOCTYPE html>
<html>
<head>
  <title>Assignment 1</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body { margin:0; font-family:sans-serif; background:linear-gradient(135deg,#5f9cff,#8e44ad); display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); padding:25px; border-radius:15px; width:350px; color:white; text-align:center; }
    button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:8px; cursor:pointer; }
    .train { background:black; color:white; }
    .save { background:#00ffae; }
    .log { margin-top:10px; height:100px; overflow:auto; background:rgba(0,0,0,0.3); padding:8px; border-radius:8px; font-size:12px;}
  </style>
</head>

<body>
<div class="card">
  <h3>Assignment 1</h3>
  <p>Train & Save Model</p>

  <button class="train" onclick="train()">Train Model</button>
  <button class="save" onclick="save()" id="saveBtn" disabled>Save Model</button>

  <div class="log" id="log">Ready...</div>
</div>

<script>
let model;
const xs=tf.tensor2d([[0,0],[0,1],[1,0],[1,1]]);
const ys=tf.tensor2d([[0],[1],[1],[0]]);

function log(msg){document.getElementById("log").innerHTML+="<br>"+msg;}

async function train(){
  model=tf.sequential();
  model.add(tf.layers.dense({units:4,inputShape:[2],activation:'relu'}));
  model.add(tf.layers.dense({units:1,activation:'sigmoid'}));
  model.compile({optimizer:'adam',loss:'binaryCrossentropy'});

  await model.fit(xs,ys,{epochs:50,callbacks:{
    onEpochEnd:(e,l)=>{if((e+1)%10==0) log(`Epoch ${e+1} loss ${l.loss.toFixed(4)}`);}
  }});

  log("Training Done ✅");
  document.getElementById("saveBtn").disabled=false;
}

async function save(){
  await model.save('localstorage://xor-model');
  log("Model Saved 💾");
}
</script>
</body>
</html>
