<!DOCTYPE html>
<html>
<head>
  <title>Assignment 3</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#5f9cff,#8e44ad); display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:rgba(255,255,255,0.1); padding:25px; border-radius:20px; width:380px; color:white; text-align:center; }
    video { border-radius:10px; }
    button { width:100%; padding:10px; margin-top:8px; border:none; border-radius:10px; cursor:pointer; }
    .open { background:#00ffae; color:black; }
    .fist { background:#ff7675; }
    .predict { background:#f1c40f; color:black; }
    .result { margin-top:10px; font-weight:bold; }
  </style>
</head>

<body>
<div class="card">
  <h2>Assignment 3</h2>
  <p>Hand Gesture Recognition</p>

  <video id="webcam" width="300" autoplay></video>

  <button class="open" onclick="addExample('Open Hand')">Add Open Hand</button>
  <button class="fist" onclick="addExample('Fist')">Add Fist</button>

  <button class="predict" onclick="predict()">Predict</button>

  <div class="result" id="result">Prediction: --</div>
</div>

<script>
let net, classifier;
const webcam = document.getElementById("webcam");

async function setup(){
  net = await mobilenet.load();
  classifier = knnClassifier.create();

  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  webcam.srcObject = stream;
}

async function addExample(label){
  const img = tf.browser.fromPixels(webcam);
  const activation = net.infer(img, true);
  classifier.addExample(activation, label);
}

async function predict(){
  if(classifier.getNumClasses() > 0){
    const img = tf.browser.fromPixels(webcam);
    const activation = net.infer(img, true);
    const result = await classifier.predictClass(activation);

    document.getElementById("result").innerText =
      "Prediction: " + result.label +
      " (" + (result.confidences[result.label]*100).toFixed(2) + "%)";
  } else {
    alert("Train first!");
  }
}

setup();
</script>
</body>
</html>
