<!DOCTYPE html>
<html>
<head>
  <title>Assignment 2</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

  <style>
    body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#5f9cff,#8e44ad); display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:rgba(255,255,255,0.1); padding:25px; border-radius:20px; width:380px; color:white; text-align:center; }
    video { border-radius:10px; }
    button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:10px; cursor:pointer; }
    .open { background:#00ffae; color:black; }
    .fist { background:#ff7675; }
  </style>
</head>

<body>
<div class="card">
  <h2>Assignment 2</h2>
  <p>Train Hand Gestures</p>

  <video id="webcam" width="300" autoplay></video>

  <button class="open" onclick="addExample('Open Hand')">Add Open Hand</button>
  <button class="fist" onclick="addExample('Fist')">Add Fist</button>
</div>

<script>
let net, classifier;
const webcam = document.getElementById("webcam");

async function setup(){
  net = await mobilenet.load();
  classifier = knnClassifier.create();

  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  webcam.srcObject = stream;
}

async function addExample(label){
  const img = tf.browser.fromPixels(webcam);
  const activation = net.infer(img, true);
  classifier.addExample(activation, label);

  alert(label + " added!");
}

setup();
</script>
</body>
</html>
