<!DOCTYPE html>
<html>
<head>
  <title>Pose Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; justify-content: center; padding: 40px 16px; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #e8e8e6; border-radius: 16px; padding: 28px; width: 100%; max-width: 500px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .icon-wrap { width: 32px; height: 32px; border-radius: 50%; background: #f5f5f3; border: 1px solid #e8e8e6; display: flex; align-items: center; justify-content: center; }
    .header h2 { font-size: 17px; font-weight: 500; color: #1a1a1a; }
    .subtitle { font-size: 12px; color: #999; margin-bottom: 20px; padding-left: 42px; }
    .video-wrap { position: relative; background: #f5f5f3; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e6; margin-bottom: 18px; }
    canvas { display: block; width: 100%; }
    .controls { display: flex; gap: 10px; margin-bottom: 18px; }
    .btn { flex: 1; padding: 10px; border: 1px solid #e0e0de; border-radius: 10px; background: #fafaf9; font-size: 13px; color: #444; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    .btn:hover { background: #f0f0ee; }
    .stats-box { background: #fafaf9; border: 1px solid #e8e8e6; border-radius: 10px; padding: 14px; }
    .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .stats-label { font-size: 12px; color: #888; font-weight: 500; }
    .count-badge { font-size: 11px; background: #fff; border: 1px solid #e8e8e6; border-radius: 20px; padding: 2px 10px; color: #888; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #fff; border: 1px solid #e8e8e6; color: #aaa; transition: all 0.2s; }
    .chip.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .status { font-size: 12px; color: #bbb; text-align: center; margin-top: 14px; }
    .status.ready { color: #3d9970; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="12" cy="5" r="2"/><line x1="12" y1="7" x2="12" y2="14"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="14" x2="9" y2="19"/><line x1="12" y1="14" x2="15" y2="19"/></svg>
      </div>
      <h2>Pose detection</h2>
    </div>
    <p class="subtitle">PoseNet · MobileNet v2 · Basic keypoints</p>

    <div class="video-wrap">
      <canvas id="canvas" width="460" height="345"></canvas>
    </div>

    <div class="controls">
      <button class="btn" onclick="startWebcam()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Start webcam
      </button>
      <button class="btn" onclick="startDetection()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Detect pose
      </button>
    </div>

    <div class="stats-box">
      <div class="stats-header">
        <span class="stats-label">Keypoints detected</span>
        <span class="count-badge" id="countBadge">0 / 17</span>
      </div>
      <div class="chips" id="chips">
        <span class="chip">nose</span><span class="chip">left eye</span><span class="chip">right eye</span>
        <span class="chip">left ear</span><span class="chip">right ear</span><span class="chip">left shoulder</span>
        <span class="chip">right shoulder</span><span class="chip">left elbow</span><span class="chip">right elbow</span>
        <span class="chip">left wrist</span><span class="chip">right wrist</span><span class="chip">left hip</span>
        <span class="chip">right hip</span><span class="chip">left knee</span><span class="chip">right knee</span>
        <span class="chip">left ankle</span><span class="chip">right ankle</span>
      </div>
    </div>
    <p class="status ready" id="status">Loading PoseNet...</p>
  </div>

  <script>
    let model, video, detecting = false;

    async function init() {
      model = await posenet.load();
      document.getElementById('status').innerText = 'Model ready — start webcam, then detect.';
    }

    async function startWebcam() {
      video = document.createElement('video');
      video.width = 460; video.height = 345;
      video.setAttribute('playsinline', true);
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      video.play();
      document.getElementById('status').innerText = 'Webcam started. Click Detect Pose!';
    }

    async function startDetection() {
      if (!video || !model) return;
      detecting = true;
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const chips = document.querySelectorAll('.chip');

      async function loop() {
        if (!detecting) return;

        ctx.drawImage(video, 0, 0, 460, 345);
        const pose = await model.estimateSinglePose(video, { flipHorizontal: false });

        // Draw dots on top of video frame
        let activeCount = 0;
        pose.keypoints.forEach((kp, i) => {
          const isActive = kp.score > 0.4;
          if (chips[i]) chips[i].classList.toggle('active', isActive);
          if (isActive) {
            activeCount++;
            // Outer dot
            ctx.beginPath();
            ctx.arc(kp.position.x, kp.position.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(26,26,26,0.85)';
            ctx.fill();
            // Inner white dot
            ctx.beginPath();
            ctx.arc(kp.position.x, kp.position.y, 3.5, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
          }
        });

        document.getElementById('countBadge').innerText = `${activeCount} / 17`;
        document.getElementById('status').innerText = `Score: ${(pose.score * 100).toFixed(1)}%`;

        setTimeout(() => requestAnimationFrame(loop), 80);
      }
      loop();
    }

    init();
  </script>
</body>
</html>
