<!DOCTYPE html>
<html>
<head>
  <title>Pose Detection — Confidence</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; justify-content: center; padding: 40px 16px; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #e8e8e6; border-radius: 16px; padding: 28px; width: 100%; max-width: 500px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .icon-wrap { width: 32px; height: 32px; border-radius: 50%; background: #f5f5f3; border: 1px solid #e8e8e6; display: flex; align-items: center; justify-content: center; }
    .header h2 { font-size: 17px; font-weight: 500; color: #1a1a1a; }
    .subtitle { font-size: 12px; color: #999; margin-bottom: 20px; padding-left: 42px; }
    .video-wrap { background: #f5f5f3; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e6; margin-bottom: 18px; }
    canvas { display: block; width: 100%; }
    .controls { display: flex; gap: 10px; margin-bottom: 18px; }
    .btn { flex: 1; padding: 10px; border: 1px solid #e0e0de; border-radius: 10px; background: #fafaf9; font-size: 13px; color: #444; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    .btn:hover { background: #f0f0ee; }
    .btn.stop { border-color: #f5c2c2; color: #c0392b; background: #fff5f5; }
    .btn.stop:hover { background: #fdecea; }
    .conf-box { background: #fafaf9; border: 1px solid #e8e8e6; border-radius: 10px; padding: 14px; }
    .conf-title { font-size: 12px; color: #888; font-weight: 500; margin-bottom: 12px; }
    .conf-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .conf-row:last-child { margin-bottom: 0; }
    .conf-rank { font-size: 11px; color: #ccc; width: 16px; text-align: right; flex-shrink: 0; }
    .conf-name { font-size: 12px; color: #555; width: 110px; flex-shrink: 0; }
    .conf-bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .conf-bar-fill { height: 100%; background: #1a1a1a; border-radius: 3px; transition: width 0.25s ease; }
    .conf-pct { font-size: 11px; color: #888; width: 36px; text-align: right; flex-shrink: 0; }
    .status { font-size: 12px; color: #bbb; text-align: center; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="12" cy="5" r="2"/><line x1="12" y1="7" x2="12" y2="14"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="14" x2="9" y2="19"/><line x1="12" y1="14" x2="15" y2="19"/></svg>
      </div>
      <h2>Top 5 keypoint confidence</h2>
    </div>
    <p class="subtitle">PoseNet · MobileNet v2 · Confidence scores</p>

    <div class="video-wrap">
      <canvas id="canvas" width="460" height="345"></canvas>
    </div>

    <div class="controls">
      <button class="btn" onclick="startDetection()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start
      </button>
      <button class="btn stop" onclick="stopDetection()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        Stop
      </button>
    </div>

    <div class="conf-box">
      <div class="conf-title">Top 5 keypoints by confidence</div>
      <div id="confRows">
        <div class="conf-row"><span class="conf-rank">#1</span><span class="conf-name" style="color:#ccc">—</span><div class="conf-bar-bg"><div class="conf-bar-fill" style="width:0%"></div></div><span class="conf-pct">—</span></div>
        <div class="conf-row"><span class="conf-rank">#2</span><span class="conf-name" style="color:#ccc">—</span><div class="conf-bar-bg"><div class="conf-bar-fill" style="width:0%"></div></div><span class="conf-pct">—</span></div>
        <div class="conf-row"><span class="conf-rank">#3</span><span class="conf-name" style="color:#ccc">—</span><div class="conf-bar-bg"><div class="conf-bar-fill" style="width:0%"></div></div><span class="conf-pct">—</span></div>
        <div class="conf-row"><span class="conf-rank">#4</span><span class="conf-name" style="color:#ccc">—</span><div class="conf-bar-bg"><div class="conf-bar-fill" style="width:0%"></div></div><span class="conf-pct">—</span></div>
        <div class="conf-row"><span class="conf-rank">#5</span><span class="conf-name" style="color:#ccc">—</span><div class="conf-bar-bg"><div class="conf-bar-fill" style="width:0%"></div></div><span class="conf-pct">—</span></div>
      </div>
    </div>
    <p class="status" id="status">Loading PoseNet...</p>
  </div>

  <script>
    let model, video, detecting = false;

    async function init() {
      model = await posenet.load();
      document.getElementById('status').innerText = 'Model ready — click Start.';
    }

    async function startDetection() {
      if (detecting) return;
      video = document.createElement('video');
      video.width = 460; video.height = 345;
      video.setAttribute('playsinline', true);
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();
      detecting = true;

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      async function loop() {
        if (!detecting) return;
        ctx.drawImage(video, 0, 0, 460, 345);

        const pose = await model.estimateSinglePose(video, { flipHorizontal: false });

        // Draw dots
        pose.keypoints.forEach(kp => {
          if (kp.score > 0.4) {
            ctx.beginPath();
            ctx.arc(kp.position.x, kp.position.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(26,26,26,0.85)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(kp.position.x, kp.position.y, 3.5, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.fill();
          }
        });

        // Top 5 by score
        const top5 = [...pose.keypoints].sort((a, b) => b.score - a.score).slice(0, 5);
        const rows = document.querySelectorAll('#confRows .conf-row');
        top5.forEach((kp, i) => {
          const pct = (kp.score * 100).toFixed(1);
          rows[i].querySelector('.conf-name').innerText = kp.part;
          rows[i].querySelector('.conf-name').style.color = '#555';
          rows[i].querySelector('.conf-bar-fill').style.width = pct + '%';
          rows[i].querySelector('.conf-pct').innerText = pct + '%';
        });

        document.getElementById('status').innerText = `Overall pose score: ${(pose.score * 100).toFixed(1)}%`;
        setTimeout(() => requestAnimationFrame(loop), 80);
      }
      loop();
    }

    function stopDetection() {
      detecting = false;
      document.getElementById('status').innerText = 'Detection stopped.';
    }

    init();
  </script>
</body>
</html>
