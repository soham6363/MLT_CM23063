<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment 3 – RNN vs Dense</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
background:linear-gradient(120deg,#0f0c29,#302b63,#24243e);
height:100vh;
margin:0;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:520px;
background:rgba(255,255,255,0.1);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
}

h1{
margin-bottom:10px;
}

.sub{
opacity:0.8;
font-size:14px;
margin-bottom:25px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
background:#00eaff;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #00eaff;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.progress{
margin-top:20px;
font-size:15px;
opacity:0.85;
}

#winner{
margin-top:25px;
font-size:24px;
font-weight:700;
color:#00ff9d;
}

</style>
</head>

<body>

<div class="card">

<h1>Assignment 3</h1>
<div class="sub">RNN vs Dense Neural Network Comparison</div>

<button onclick="startTraining()">Start Training</button>

<div class="progress" id="progress">Status : Waiting</div>

<div class="result" id="rnnResult">RNN Accuracy : —</div>
<div class="result" id="denseResult">Dense Accuracy : —</div>

<div id="winner"></div>

</div>

<script>

async function startTraining(){

document.getElementById("progress").innerText="Training models...";

const xs=tf.randomNormal([200,10]);
const ys=tf.round(tf.randomUniform([200,1]));


// Dense Model

const denseModel=tf.sequential();

denseModel.add(tf.layers.dense({
units:16,
inputShape:[10],
activation:'relu'
}));

denseModel.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}));

denseModel.compile({
optimizer:'adam',
loss:'binaryCrossentropy',
metrics:['accuracy']
});

let denseHistory=await denseModel.fit(xs,ys,{
epochs:10,
verbose:0
});

let denseAcc=denseHistory.history.acc ?
denseHistory.history.acc.pop() :
denseHistory.history.accuracy.pop();


// RNN Model

const rnnModel=tf.sequential();

rnnModel.add(tf.layers.simpleRNN({
units:12,
inputShape:[10,1],
activation:'tanh'
}));

rnnModel.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}));

rnnModel.compile({
optimizer:'adam',
loss:'binaryCrossentropy',
metrics:['accuracy']
});

const rnnXs=xs.reshape([200,10,1]);

let rnnHistory=await rnnModel.fit(rnnXs,ys,{
epochs:10,
verbose:0
});

let rnnAcc=rnnHistory.history.acc ?
rnnHistory.history.acc.pop() :
rnnHistory.history.accuracy.pop();


document.getElementById("rnnResult").innerText=
"RNN Accuracy : "+(rnnAcc*100).toFixed(2)+"%";

document.getElementById("denseResult").innerText=
"Dense Accuracy : "+(denseAcc*100).toFixed(2)+"%";


let winner=rnnAcc>denseAcc ? "RNN performed better" : "Dense performed better";

document.getElementById("winner").innerText=winner;

document.getElementById("progress").innerText="Training Complete";

}

</script>

</body>
</html>
